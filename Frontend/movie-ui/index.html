
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Integrated Movie Recommendations</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
   <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Remix Icon -->
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css"
      rel="stylesheet"
    />

  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background: #a4a6b3;
      color: #f8fafc;
      overflow-x: hidden;
    }
    .space-bg {
      background: radial-gradient(circle at 50% 50%, #0f172a 0%, #02061754 100%);
      position: fixed;
      inset: 0;
      z-index: -1;
    }
    .stars-overlay {
      position: fixed;
      inset: 0;
      background-image: 
        radial-gradient(1px 1px at 25% 35%, white 100%, transparent 0),
        radial-gradient(1px 1px at 50% 10%, white 100%, transparent 0),
        radial-gradient(1.5px 1.5px at 75% 65%, white 100%, transparent 0),
        radial-gradient(2px 2px at 15% 85%, white 100%, transparent 0),
        radial-gradient(1px 1px at 85% 25%, white 100%, transparent 0);
      background-size: 550px 550px;
      opacity: 0.3;
      z-index: -1;
    }
    .neon-glow {
      box-shadow: 0 0 15px rgba(34, 211, 238, 0.4);
    }
    .neon-border {
      border: 1px solid rgba(34, 211, 238, 0.5);
    }
    .neon-text {
      text-shadow: 0 0 10px rgba(34, 211, 238, 0.8);
    }
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #020617;
    }
    ::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #334155;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react-dom": "https://esm.sh/react-dom@^19.2.3",
    "react-dom/client": "https://esm.sh/react-dom@^19.2.3/client"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root"></div>
  <div class="space-bg"></div>
  <div class="stars-overlay"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
